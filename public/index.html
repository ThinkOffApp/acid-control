<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Acid Control</title>
<style>
  :root {
    --bg: #0c0f17;
    --card: #141a26;
    --line: #2a3447;
    --text: #e9eef7;
    --muted: #8896ad;
    --accent: #22c55e;
    --warn: #f59e0b;
    --hot: #ff5722;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: none; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--line); gap: 12px; }
  header .title { font-weight: 700; letter-spacing: 0.04em; }
  header .right { display: flex; align-items: center; gap: 12px; }
  header .status { font-size: 12px; color: var(--warn); }
  header .status.ok { color: var(--accent); }
  header .toggle { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line); color: var(--muted); cursor: pointer; touch-action: none; user-select: none; }
  header .toggle.on { background: var(--accent); border-color: var(--accent); color: #06120a; }

  /* Visualizer panel — local canvas visualizer that reacts to tap, camera
     hue/brightness/motion, and incoming notes. Stays small unless toggled. */
  .viz { display: none; flex: 0 0 auto; height: 38vh; min-height: 240px; max-height: 480px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #050811; position: relative; }
  .viz.on { display: block; }
  .viz canvas.viz-canvas { width: 100%; height: 100%; display: block; }
  .viz iframe { width: 100%; height: 100%; border: 0; display: block; }
  .viz .viz-source { position: absolute; right: 8px; top: 8px; font-size: 10px; color: var(--accent); background: rgba(0,0,0,0.45); padding: 3px 6px; border-radius: 4px; pointer-events: none; }
  /* Tap overlay — sits above the iframe and catches pointer events when TAP
     mode is active. Cross-hair on the last tap position. */
  .tap-overlay { position: absolute; inset: 0; touch-action: none; display: none; cursor: crosshair; }
  .viz.tap .tap-overlay { display: block; }
  .tap-overlay .crosshair { position: absolute; width: 24px; height: 24px; border: 2px solid var(--accent); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 12px var(--accent); opacity: 0; transition: opacity 0.15s; }
  .tap-overlay .crosshair.on { opacity: 1; }
  .tap-overlay .legend { position: absolute; left: 8px; bottom: 8px; font-size: 10px; color: var(--accent); pointer-events: none; background: rgba(0,0,0,0.5); padding: 3px 6px; border-radius: 4px; }

  /* Camera panel — small mirror of the phone camera + computed CCs */
  .cam { display: none; flex: 0 0 auto; height: 130px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #000; position: relative; }
  .cam.on { display: block; }
  .cam video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
  .cam canvas { display: none; }
  .cam .readout { position: absolute; left: 8px; top: 8px; right: 8px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 10px; color: var(--accent); pointer-events: none; }
  .cam .readout span { background: rgba(0,0,0,0.55); padding: 3px 6px; border-radius: 4px; font-variant-numeric: tabular-nums; }

  main { display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto auto auto auto; gap: 8px; padding: 8px; height: calc(100% - 45px); }

  /* Track launchers (one per Ableton track) */
  .tracks-row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .track-btn { background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 10px 4px; text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); touch-action: none; line-height: 1.05; }
  .track-btn.active { background: var(--accent); border-color: var(--accent); color: #06120a; }
  .track-btn.stop   { color: #f87171; }
  .track-btn.stop.active { background: #b91c1c; border-color: #b91c1c; color: #fff; }

  /* Faders */
  .faders { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; min-height: 0; }
  .fader { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 8px 6px; display: flex; flex-direction: column; min-height: 0; }
  .fader .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; text-align: center; margin-bottom: 6px; min-height: 14px; line-height: 1.1; }
  .fader .track { position: relative; flex: 1; background: #050811; border: 1px solid var(--line); border-radius: 8px; touch-action: none; min-height: 80px; }
  .fader .fill  { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, #4ade80, #16803a); border-bottom-left-radius: 7px; border-bottom-right-radius: 7px; pointer-events: none; }
  .fader .thumb { position: absolute; left: 50%; transform: translate(-50%, 50%); width: 80%; height: 8px; background: #f4f6fb; border-radius: 4px; pointer-events: none; box-shadow: 0 2px 6px rgba(0,0,0,0.6); }
  .fader .val   { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: center; font-variant-numeric: tabular-nums; }

  /* Pads / transport */
  .pads { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .pad { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 12px 6px; text-align: center; font-size: 11px; font-weight: 600; touch-action: none; color: var(--muted); }
  .pad.active { background: var(--hot); border-color: var(--hot); color: #fff; }

  /* Octave switcher row */
  .oct-row { display: flex; gap: 8px; align-items: center; padding: 4px 8px; }
  .oct-btn { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; color: var(--muted); flex: 0 0 auto; touch-action: none; }
  .oct-btn:active { background: var(--accent); border-color: var(--accent); color: #06120a; }
  .oct-display { flex: 1; text-align: center; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* Keyboard — proper piano layout. White keys flex-fill the row; black keys
     absolute-positioned at the right gaps between specific white-key pairs. */
  .keyboard { position: relative; width: 100%; height: 130px; background: #1a1a1a; border-radius: 8px; padding: 4px 4px 0; border: 1px solid var(--line); }
  .white-row { display: flex; height: 100%; gap: 2px; }
  .key.white { flex: 1; background: linear-gradient(180deg, #fafafa 0%, #fafafa 80%, #d4d4d4 100%); border: 1px solid #888; border-top: none; border-radius: 0 0 5px 5px; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15); touch-action: none; position: relative; }
  .key.white.active { background: linear-gradient(180deg, #93c5fd 0%, #60a5fa 100%); }
  .key.white .label { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 9px; color: #666; pointer-events: none; }
  .key.black { position: absolute; top: 4px; width: 7%; height: 62%; background: linear-gradient(180deg, #000 0%, #2a2a2a 70%, #444 100%); border: 1px solid #000; border-radius: 0 0 4px 4px; box-shadow: inset 0 -3px 0 rgba(255,255,255,0.1), 0 2px 6px rgba(0,0,0,0.6); touch-action: none; z-index: 2; }
  .key.black.active { background: linear-gradient(180deg, #1e3a8a 0%, #3b82f6 100%); }

  @media (max-width: 480px) {
    .faders { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
    .pads { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header>
  <div class="title">Acid Control</div>
  <div class="right">
    <div class="toggle" id="viz-toggle">VIZ</div>
    <div class="toggle" id="viz-src-toggle" title="Toggle local canvas / muikku.app">SRC</div>
    <div class="toggle" id="tap-toggle">TAP</div>
    <div class="toggle" id="cam-toggle">CAM</div>
    <div class="status" id="status">connecting…</div>
  </div>
</header>
<main>
  <div class="viz" id="viz">
    <canvas class="viz-canvas" id="viz-canvas"></canvas>
    <div class="viz-source" id="viz-source">local</div>
    <div class="tap-overlay" id="tap-overlay">
      <div class="crosshair" id="tap-crosshair"></div>
      <div class="legend">tap: CC 10 (x) · CC 11 (y) · note (oct-shifted)</div>
    </div>
  </div>
  <div class="cam" id="cam">
    <video id="cam-video" playsinline muted autoplay></video>
    <canvas id="cam-canvas"></canvas>
    <div class="readout" id="cam-readout"></div>
  </div>
  <div class="faders" id="faders"></div>
  <div class="tracks-row" id="tracks"></div>
  <div class="pads" id="pads"></div>
  <div class="oct-row">
    <div class="oct-btn" id="oct-down">OCT−</div>
    <div class="oct-display" id="oct-display">Octave: 0  ·  Pads C2  ·  Keys C4–C5</div>
    <div class="oct-btn" id="oct-up">OCT+</div>
  </div>
  <div class="keyboard" id="keyboard"><div class="white-row" id="white-row"></div></div>
</main>

<script>
  // Layout — six named faders (CC 1–6), four transport-style pads (notes 36–39)
  // plus four spare pads (notes 40–43), and a one-octave piano (notes 60–72).
  // All on MIDI channel 1. Re-map any control in Ableton via Cmd+M MIDI Learn.
  const CHANNEL = 1;
  const FADERS = [
    { label: 'Cutoff',   cc: 1 },
    { label: 'Reso',     cc: 2 },
    { label: 'Volume',   cc: 3 },
    { label: 'Drive',    cc: 4 },
    { label: 'Echo Mix', cc: 5 },
    { label: 'Reverb',   cc: 6 },
  ];
  const PADS = [
    { label: 'PLAY',  note: 36 },
    { label: 'STOP',  note: 37 },
    { label: 'REC',   note: 38 },
    { label: 'LOOP',  note: 39 },
    { label: 'PAD 1', note: 40 },
    { label: 'PAD 2', note: 41 },
    { label: 'PAD 3', note: 42 },
    { label: 'PAD 4', note: 43 },
  ];

  // Piano keys C4 (60) through C5 (72). White keys in order; black keys live
  // at gaps 0, 1, 3, 4, 5 (between C-D, D-E, F-G, G-A, A-B).
  const WHITE_NOTES = [
    { note: 60, label: 'C4' }, { note: 62, label: 'D4' }, { note: 64, label: 'E4' },
    { note: 65, label: 'F4' }, { note: 67, label: 'G4' }, { note: 69, label: 'A4' },
    { note: 71, label: 'B4' }, { note: 72, label: 'C5' },
  ];
  const BLACK_KEYS = [
    { note: 61, afterWhite: 0 }, // C#4
    { note: 63, afterWhite: 1 }, // D#4
    { note: 66, afterWhite: 3 }, // F#4
    { note: 68, afterWhite: 4 }, // G#4
    { note: 70, afterWhite: 5 }, // A#4
  ];

  // --- Visualizer ---
  // Two sources, toggled via SRC:
  //   * local canvas (default) — particles + bloom that react to tap, camera
  //     hue/brightness/motion, and note triggers. Runs at 60 FPS, no network.
  //   * muikku.app iframe — kept as an option but petrus reported it is
  //     better in the Android app than embedded; default is local.
  // The TAP overlay sits above whichever is active so tap-to-MIDI works in
  // either mode.
  const vizEl = document.getElementById('viz');
  const vizToggle = document.getElementById('viz-toggle');
  const vizSrcToggle = document.getElementById('viz-src-toggle');
  const vizSourceLabel = document.getElementById('viz-source');
  const vizCanvas = document.getElementById('viz-canvas');
  let vizSource = 'local';   // 'local' | 'muikku'
  let vizIframeEl = null;
  let vizRafId = null;

  function setVizSource(src) {
    vizSource = src;
    if (src === 'muikku') {
      if (!vizIframeEl) {
        vizIframeEl = document.createElement('iframe');
        vizIframeEl.src = 'https://muikku.app/';
        vizIframeEl.allow = 'autoplay; microphone; camera; display-capture; fullscreen; xr-spatial-tracking; gyroscope; accelerometer';
        vizIframeEl.referrerPolicy = 'no-referrer';
        vizEl.insertBefore(vizIframeEl, vizEl.firstChild);
      }
      vizIframeEl.style.display = 'block';
      vizCanvas.style.display = 'none';
      stopVizLoop();
    } else {
      if (vizIframeEl) vizIframeEl.style.display = 'none';
      vizCanvas.style.display = 'block';
      if (vizEl.classList.contains('on')) startVizLoop();
    }
    vizSourceLabel.textContent = src;
    vizSrcToggle.classList.toggle('on', src === 'muikku');
    try { localStorage.setItem('viz_src', src); } catch {}
  }
  vizSrcToggle.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    setVizSource(vizSource === 'local' ? 'muikku' : 'local');
  });

  function setViz(on) {
    vizEl.classList.toggle('on', on);
    vizToggle.classList.toggle('on', on);
    if (on && vizSource === 'local') startVizLoop();
    if (!on) stopVizLoop();
    try { localStorage.setItem('viz', on ? '1' : '0'); } catch {}
  }
  vizToggle.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    setViz(!vizEl.classList.contains('on'));
  });

  // ---- Local canvas visualizer ----
  // State that the visualizer reads. Updated by tap, camera, and note events.
  const vizState = {
    tapX: 0.5, tapY: 0.5, tapping: false,
    bright: 0.5, motion: 0, hue: 0,  // 0..1
    pulse: 0,                         // decays each frame
    particles: [],                    // {x,y,vx,vy,life,hue}
  };
  function spawnParticles(x, y, hue, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = 0.3 + Math.random() * 1.2;
      vizState.particles.push({
        x, y,
        vx: Math.cos(a) * v, vy: Math.sin(a) * v,
        life: 1, hue: hue + (Math.random() - 0.5) * 30,
      });
    }
    if (vizState.particles.length > 400) vizState.particles.splice(0, vizState.particles.length - 400);
  }
  function pulseViz(amount) { vizState.pulse = Math.min(1, vizState.pulse + amount); }
  function vizFrame() {
    vizRafId = requestAnimationFrame(vizFrame);
    const c = vizCanvas;
    const w = c.clientWidth, h = c.clientHeight;
    if (c.width !== w * devicePixelRatio || c.height !== h * devicePixelRatio) {
      c.width = w * devicePixelRatio; c.height = h * devicePixelRatio;
    }
    const ctx = c.getContext('2d');
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    // Background: brightness from camera, hue tint from camera + tap pulse.
    const bg = `hsl(${vizState.hue * 360}, 30%, ${4 + vizState.bright * 12 + vizState.pulse * 25}%)`;
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    // Grid pattern, drifts with tap X, distortion with motion.
    ctx.strokeStyle = `hsla(${(vizState.hue * 360 + 180) % 360}, 80%, 70%, ${0.18 + vizState.motion * 0.4})`;
    ctx.lineWidth = 1;
    const gridSize = 28;
    const ox = (vizState.tapX - 0.5) * 60;
    const oy = (vizState.tapY - 0.5) * 60;
    ctx.beginPath();
    for (let x = (ox % gridSize); x < w; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
    for (let y = (oy % gridSize); y < h; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
    ctx.stroke();
    // Tap glow.
    if (vizState.tapping) {
      const tx = vizState.tapX * w, ty = (1 - vizState.tapY) * h;
      const grd = ctx.createRadialGradient(tx, ty, 0, tx, ty, 90);
      grd.addColorStop(0, `hsla(${vizState.hue * 360}, 90%, 70%, 0.85)`);
      grd.addColorStop(1, `hsla(${vizState.hue * 360}, 90%, 50%, 0)`);
      ctx.fillStyle = grd;
      ctx.fillRect(tx - 90, ty - 90, 180, 180);
    }
    // Particles.
    ctx.globalCompositeOperation = 'lighter';
    for (let i = vizState.particles.length - 1; i >= 0; i--) {
      const p = vizState.particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.985; p.vy *= 0.985;
      p.vy += 0.02;
      p.life -= 0.012;
      if (p.life <= 0) { vizState.particles.splice(i, 1); continue; }
      ctx.fillStyle = `hsla(${p.hue}, 90%, 60%, ${p.life})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2 + p.life * 4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
    // Decay pulse.
    vizState.pulse *= 0.92;
  }
  function startVizLoop() {
    if (vizRafId) return;
    vizRafId = requestAnimationFrame(vizFrame);
  }
  function stopVizLoop() {
    if (vizRafId) { cancelAnimationFrame(vizRafId); vizRafId = null; }
  }
  // Restore saved state — source first, then on/off.
  try {
    const savedSrc = localStorage.getItem('viz_src');
    if (savedSrc === 'muikku' || savedSrc === 'local') setVizSource(savedSrc);
    else setVizSource('local');
  } catch { setVizSource('local'); }
  try { if (localStorage.getItem('viz') === '1') setViz(true); } catch {}

  // --- TAP mode (tap on muikku.app overlay) ---
  // When TAP is on, an overlay above the iframe captures pointer events.
  // X/Y of the tap or drag → CC 10 / CC 11 (0–127). Pointer-down → note 70 on,
  // pointer-up → note 70 off. Auto-enables VIZ if it isn't already.
  const TAP_CC_X = 10, TAP_CC_Y = 11, TAP_NOTE = 70;
  const tapToggle = document.getElementById('tap-toggle');
  const tapOverlay = document.getElementById('tap-overlay');
  const tapCrosshair = document.getElementById('tap-crosshair');
  function setTap(on) {
    if (on) setViz(true);
    vizEl.classList.toggle('tap', on);
    tapToggle.classList.toggle('on', on);
    try { localStorage.setItem('tap', on ? '1' : '0'); } catch {}
  }
  tapToggle.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    setTap(!vizEl.classList.contains('tap'));
  });
  let tapPid = null;
  let lastTapNote = TAP_NOTE; // remembered so we send note-off at the same shifted value as note-on
  function tapFromEvent(e) {
    const r = tapOverlay.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    const y = Math.max(0, Math.min(1, (e.clientY - r.top)  / r.height));
    send({ type: 'cc', channel: 1, cc: TAP_CC_X, value: Math.round(x * 127) });
    send({ type: 'cc', channel: 1, cc: TAP_CC_Y, value: Math.round((1 - y) * 127) });
    tapCrosshair.style.left = (x * 100) + '%';
    tapCrosshair.style.top  = (y * 100) + '%';
    vizState.tapX = x; vizState.tapY = 1 - y; vizState.tapping = true;
  }
  tapOverlay.addEventListener('pointerdown', (e) => {
    tapPid = e.pointerId;
    tapOverlay.setPointerCapture(tapPid);
    tapCrosshair.classList.add('on');
    tapFromEvent(e);
    // Apply the same octave shift as the keyboard / pads.
    lastTapNote = shifted(TAP_NOTE);
    send({ type: 'note', channel: 1, note: lastTapNote, value: 127 });
    pulseViz(0.6);
    spawnParticles(vizState.tapX * vizCanvas.clientWidth, (1 - vizState.tapY) * vizCanvas.clientHeight, vizState.hue * 360, 14);
    e.preventDefault();
  });
  tapOverlay.addEventListener('pointermove', (e) => {
    if (tapPid === null || e.pointerId !== tapPid) return;
    tapFromEvent(e);
  });
  function tapEnd(e) {
    if (tapPid === null || e.pointerId !== tapPid) return;
    tapCrosshair.classList.remove('on');
    send({ type: 'note', channel: 1, note: lastTapNote, value: 0 });
    vizState.tapping = false;
    try { tapOverlay.releasePointerCapture(tapPid); } catch {}
    tapPid = null;
  }
  tapOverlay.addEventListener('pointerup',     tapEnd);
  tapOverlay.addEventListener('pointercancel', tapEnd);
  try { if (localStorage.getItem('tap') === '1') setTap(true); } catch {}

  // --- CAM mode (phone camera → CC) ---
  // Captures the front-facing camera at low resolution, computes three signals
  // per frame, and sends them as CC 12 / 13 / 14 every ~100 ms (10 Hz). All
  // analysis is on-device; nothing leaves the phone except the resulting CCs.
  //   CC 12 = brightness (mean luma 0..127)
  //   CC 13 = motion energy (frame-diff magnitude 0..127)
  //   CC 14 = average hue (0..127, mapped from 0..360°)
  // The video itself is rendered as a small mirror-flipped preview.
  const CAM_CC_BRIGHT = 12, CAM_CC_MOTION = 13, CAM_CC_HUE = 14;
  const camToggle = document.getElementById('cam-toggle');
  const camEl = document.getElementById('cam');
  const camVideo = document.getElementById('cam-video');
  const camCanvas = document.getElementById('cam-canvas');
  const camReadout = document.getElementById('cam-readout');
  let camStream = null;
  let camTimer = null;
  let camPrevPixels = null;
  async function setCam(on) {
    if (on) {
      try {
        camStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
          audio: false,
        });
        camVideo.srcObject = camStream;
        await camVideo.play();
        camCanvas.width = 64; camCanvas.height = 48; // tiny analysis buffer
        camPrevPixels = null;
        camTimer = setInterval(camTick, 100);
        camEl.classList.add('on');
        camToggle.classList.add('on');
        try { localStorage.setItem('cam', '1'); } catch {}
      } catch (err) {
        // Most likely cause on phones over LAN HTTP: getUserMedia requires a
        // secure context. Surface the reason inline so it does not look
        // silently broken.
        const isInsecure = location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';
        const reason = isInsecure
          ? 'CAM needs HTTPS. iOS/Safari requires it; Android sometimes too. Use the bridge over a Tailscale Funnel or a self-signed cert.'
          : (err && err.message ? err.message : 'camera unavailable');
        camEl.classList.add('on');
        camEl.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:12px;text-align:center;font-size:11px;color:var(--warn);background:rgba(0,0,0,0.5);">${reason}</div>`;
        camToggle.classList.remove('on');
        try { localStorage.setItem('cam', '0'); } catch {}
        console.error('camera error', err);
      }
    } else {
      if (camTimer) { clearInterval(camTimer); camTimer = null; }
      if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
      camVideo.srcObject = null;
      camPrevPixels = null;
      camEl.classList.remove('on');
      camToggle.classList.remove('on');
      try { localStorage.setItem('cam', '0'); } catch {}
    }
  }
  function camTick() {
    if (!camStream || camVideo.readyState < 2) return;
    const ctx = camCanvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(camVideo, 0, 0, camCanvas.width, camCanvas.height);
    const px = ctx.getImageData(0, 0, camCanvas.width, camCanvas.height).data;
    let lumaSum = 0, motionSum = 0;
    let hueX = 0, hueY = 0;
    const n = px.length / 4;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i + 1], b = px[i + 2];
      // Rec.709 luma weights
      const y = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      lumaSum += y;
      // Hue from RGB → angle on color wheel, summed as unit vectors so the
      // mean hue is a vector mean (handles wrap-around at 360°).
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const d = max - min;
      if (d > 16) {
        let h;
        if      (max === r) h = ((g - b) / d) % 6;
        else if (max === g) h = (b - r) / d + 2;
        else                h = (r - g) / d + 4;
        const ang = h * 60 * Math.PI / 180;
        hueX += Math.cos(ang); hueY += Math.sin(ang);
      }
      // Frame-difference luma against previous frame.
      if (camPrevPixels) {
        motionSum += Math.abs(y - camPrevPixels[i / 4]);
      }
    }
    const meanLuma = lumaSum / n;        // 0..255
    const meanMotion = motionSum / n;    // 0..255
    const meanHueDeg = (Math.atan2(hueY, hueX) * 180 / Math.PI + 360) % 360;
    const ccBright = Math.max(0, Math.min(127, Math.round(meanLuma * 127 / 255)));
    const ccMotion = Math.max(0, Math.min(127, Math.round(meanMotion * 4 * 127 / 255))); // amplify x4
    const ccHue    = Math.max(0, Math.min(127, Math.round(meanHueDeg * 127 / 360)));
    send({ type: 'cc', channel: 1, cc: CAM_CC_BRIGHT, value: ccBright });
    send({ type: 'cc', channel: 1, cc: CAM_CC_MOTION, value: ccMotion });
    send({ type: 'cc', channel: 1, cc: CAM_CC_HUE,    value: ccHue });
    camReadout.innerHTML =
      `<span>BR ${ccBright}</span><span>MO ${ccMotion}</span><span>HU ${ccHue}</span>`;
    // Drive the local visualizer with the same signals.
    vizState.bright = ccBright / 127;
    vizState.motion = ccMotion / 127;
    vizState.hue    = ccHue    / 127;
    // Cache only luma-per-pixel for the motion delta on next tick.
    const lumaArr = new Uint8ClampedArray(n);
    for (let j = 0, i = 0; j < n; j++, i += 4) {
      lumaArr[j] = 0.2126 * px[i] + 0.7152 * px[i + 1] + 0.0722 * px[i + 2];
    }
    camPrevPixels = lumaArr;
  }
  camToggle.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    setCam(!camEl.classList.contains('on'));
  });
  try { if (localStorage.getItem('cam') === '1') setCam(true); } catch {}

  // WebSocket connection with linear-then-capped backoff. Drops messages while
  // disconnected (stale fader values not worth queuing).
  const statusEl = document.getElementById('status');
  let ws = null;
  let reconnectMs = 500;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/`);
    ws.addEventListener('open', () => {
      statusEl.textContent = 'connected';
      statusEl.className = 'status ok';
      reconnectMs = 500;
    });
    ws.addEventListener('close', () => {
      statusEl.textContent = 'disconnected — retrying';
      statusEl.className = 'status';
      setTimeout(connect, reconnectMs);
      reconnectMs = Math.min(reconnectMs * 1.6, 5000);
    });
    ws.addEventListener('error', () => { try { ws.close(); } catch {} });
  }
  connect();

  function send(obj) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify(obj));
  }

  // --- Octave shift ---
  // Pads + keyboard share a single octave-shift offset measured in semitones
  // (multiples of 12). Range chosen so the lowest pad note stays >= 0 and the
  // highest keyboard note stays <= 127.
  let octaveShift = 0;
  const OCT_MIN = -3;
  const OCT_MAX = 4;
  const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  function noteName(midi) {
    const n = NOTE_NAMES[((midi % 12) + 12) % 12];
    const oct = Math.floor(midi / 12) - 1;
    return n + oct;
  }
  function shifted(note) {
    return Math.max(0, Math.min(127, note + octaveShift * 12));
  }
  function updateOctaveDisplay() {
    const padsLow  = noteName(shifted(PADS[0].note));
    const keysLow  = noteName(shifted(WHITE_NOTES[0].note));
    const keysHigh = noteName(shifted(WHITE_NOTES[WHITE_NOTES.length - 1].note));
    document.getElementById('oct-display').textContent =
      `Octave: ${octaveShift >= 0 ? '+' : ''}${octaveShift}  ·  Pads ${padsLow}+  ·  Keys ${keysLow}–${keysHigh}`;
  }
  function changeOctave(delta) {
    const next = Math.max(OCT_MIN, Math.min(OCT_MAX, octaveShift + delta));
    if (next === octaveShift) return;
    // Release any held notes at the OLD octave so Ableton doesn't get stuck
    // notes when keys "move" mid-press. Pads send on CHANNEL (1), keys send
    // on KEY_CHANNEL (3) — release on the same channel they were pressed on.
    for (const el of document.querySelectorAll('.key.active, .pad.active')) {
      const baseNote = +el.dataset.note;
      const ch = el.classList.contains('key') ? KEY_CHANNEL : CHANNEL;
      send({ type: 'note', channel: ch, note: shifted(baseNote), value: 0 });
      el.classList.remove('active');
    }
    activeByPointer.clear();
    octaveShift = next;
    updateOctaveDisplay();
  }
  document.getElementById('oct-down').addEventListener('pointerdown', (e) => { e.preventDefault(); changeOctave(-1); });
  document.getElementById('oct-up'  ).addEventListener('pointerdown', (e) => { e.preventDefault(); changeOctave(+1); });

  // --- Faders ---
  function buildFader(parent, cfg) {
    const el = document.createElement('div'); el.className = 'fader';
    el.innerHTML = `
      <div class="label">${cfg.label}</div>
      <div class="track">
        <div class="fill"></div>
        <div class="thumb"></div>
      </div>
      <div class="val">CC ${cfg.cc} · 0</div>`;
    const track = el.querySelector('.track');
    const fill  = el.querySelector('.fill');
    const thumb = el.querySelector('.thumb');
    const valEl = el.querySelector('.val');
    let lastSent = -1;
    function set(value) {
      value = Math.max(0, Math.min(127, value | 0));
      const pct = (value / 127) * 100;
      fill.style.height = pct + '%';
      thumb.style.bottom = pct + '%';
      valEl.textContent = `CC ${cfg.cc} · ${value}`;
      if (value !== lastSent) {
        send({ type: 'cc', channel: CHANNEL, cc: cfg.cc, value });
        lastSent = value;
      }
    }
    function fromY(clientY) {
      const r = track.getBoundingClientRect();
      const ratio = 1 - (clientY - r.top) / r.height;
      set(Math.round(ratio * 127));
    }
    let pid = null;
    track.addEventListener('pointerdown', (e) => { pid = e.pointerId; track.setPointerCapture(pid); fromY(e.clientY); e.preventDefault(); });
    track.addEventListener('pointermove', (e) => { if (pid !== null && e.pointerId === pid) fromY(e.clientY); });
    track.addEventListener('pointerup',   (e) => { if (pid !== null && e.pointerId === pid) { try { track.releasePointerCapture(pid); } catch {} pid = null; } });
    track.addEventListener('pointercancel', () => { pid = null; });
    parent.appendChild(el);
  }

  // --- Pads (note on / off) ---
  // Each pad stores its BASE note in dataset.note; the actual sent note is
  // computed via shifted() at press / release time so octave changes apply.
  function buildPad(parent, cfg) {
    const el = document.createElement('div'); el.className = 'pad';
    el.textContent = cfg.label;
    el.dataset.note = cfg.note;
    function press()   { el.classList.add('active');    send({ type: 'note', channel: CHANNEL, note: shifted(cfg.note), value: 127 }); }
    function release() { if (!el.classList.contains('active')) return; el.classList.remove('active'); send({ type: 'note', channel: CHANNEL, note: shifted(cfg.note), value: 0 }); }
    el.addEventListener('pointerdown', (e) => { press(); el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener('pointerup',     release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', () => { if (el.classList.contains('active')) release(); });
    parent.appendChild(el);
  }

  // --- Keyboard ---
  // Multi-touch capable: pointerId → key element, so two fingers on different
  // keys both register. Key changes mid-drag (slide between keys) trigger
  // note-off / note-on of the previous / new key.
  const activeByPointer = new Map();
  // Keyboard runs on its own MIDI channel so a dedicated Ableton track can
  // host a separate synth for the on-screen piano without sharing notes with
  // the pads (ch 1) or track launchers (ch 2). To use: in Ableton, add a MIDI
  // track, set MIDI From = touch-control, All Channels -> Ch. 3, drop any
  // instrument on it, set Monitor = In.
  const KEY_CHANNEL = 3;
  function pressKey(el) {
    if (el.classList.contains('active')) return;
    el.classList.add('active');
    send({ type: 'note', channel: KEY_CHANNEL, note: shifted(+el.dataset.note), value: 127 });
  }
  function releaseKey(el) {
    if (!el || !el.classList.contains('active')) return;
    el.classList.remove('active');
    send({ type: 'note', channel: KEY_CHANNEL, note: shifted(+el.dataset.note), value: 0 });
  }
  function keyAtPoint(x, y) {
    const stack = document.elementsFromPoint(x, y);
    return stack.find(el => el.classList && el.classList.contains('key')) || null;
  }
  function bindKey(el) {
    el.addEventListener('pointerdown', (e) => {
      // The keyboard container handles the move/up so finger-slides between
      // keys work — bind capture to the keyboard, not the individual key.
      activeByPointer.set(e.pointerId, el);
      pressKey(el);
      keyboardEl.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
  }
  const keyboardEl = document.getElementById('keyboard');
  const whiteRow = document.getElementById('white-row');
  WHITE_NOTES.forEach((k) => {
    const el = document.createElement('div'); el.className = 'key white';
    el.dataset.note = k.note;
    el.innerHTML = `<div class="label">${k.label}</div>`;
    bindKey(el);
    whiteRow.appendChild(el);
  });
  // Black keys: one black key spans roughly half a white key's width and sits
  // on the boundary between the white at index `afterWhite` and the next.
  // We compute left as a percentage of the white-row width.
  const whiteCount = WHITE_NOTES.length;
  BLACK_KEYS.forEach((b) => {
    const el = document.createElement('div'); el.className = 'key black';
    el.dataset.note = b.note;
    // Center on the boundary between white[afterWhite] and white[afterWhite+1].
    // White width = (100% - small padding) / whiteCount. Black is 7% wide and
    // shifts left by half that to center on the boundary.
    const centerPct = ((b.afterWhite + 1) / whiteCount) * 100;
    el.style.left = `calc(${centerPct}% - 3.5%)`;
    bindKey(el);
    keyboardEl.appendChild(el);
  });
  keyboardEl.addEventListener('pointermove', (e) => {
    if (!activeByPointer.has(e.pointerId)) return;
    const prev = activeByPointer.get(e.pointerId);
    const next = keyAtPoint(e.clientX, e.clientY);
    if (next && next !== prev) {
      releaseKey(prev);
      activeByPointer.set(e.pointerId, next);
      pressKey(next);
    }
  });
  function endPointer(e) {
    if (!activeByPointer.has(e.pointerId)) return;
    releaseKey(activeByPointer.get(e.pointerId));
    activeByPointer.delete(e.pointerId);
    try { keyboardEl.releasePointerCapture(e.pointerId); } catch {}
  }
  keyboardEl.addEventListener('pointerup',     endPointer);
  keyboardEl.addEventListener('pointercancel', endPointer);
  keyboardEl.addEventListener('pointerleave',  endPointer);

  // --- Track launchers ---
  // Nine per-track buttons + one Stop All. Each sends a unique note on a
  // separate "track" channel (channel 2) so they never collide with the pads
  // (channel 1, notes 36-43) or the keyboard (channel 1, notes 60-72).
  // MIDI Learn each one to a clip-launch button in Ableton's Session view.
  const TRACK_CHANNEL = 2;
  const TRACKS = [
    { label: 'T1\nMIDI',  note: 36 },
    { label: 'T2\nOther', note: 37 },
    { label: 'T3\nKick',  note: 38 },
    { label: 'T4\nHats',  note: 39 },
    { label: 'T5\nPerc',  note: 40 },
    { label: 'T6\n303',   note: 41 },
    { label: 'T7\nLead',  note: 42 },
    { label: 'T8\nChord', note: 43 },
    { label: 'T9\nBass',  note: 44 },
  ];
  function buildTrackBtn(parent, cfg, isStop = false) {
    const el = document.createElement('div');
    el.className = 'track-btn' + (isStop ? ' stop' : '');
    el.innerHTML = cfg.label.replace('\n', '<br>');
    function press()   { el.classList.add('active');    send({ type: 'note', channel: TRACK_CHANNEL, note: cfg.note, value: 127 }); }
    function release() { if (!el.classList.contains('active')) return; el.classList.remove('active'); send({ type: 'note', channel: TRACK_CHANNEL, note: cfg.note, value: 0 }); }
    el.addEventListener('pointerdown', (e) => { press(); el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener('pointerup',     release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', () => { if (el.classList.contains('active')) release(); });
    parent.appendChild(el);
  }

  // Build everything.
  const fadersEl = document.getElementById('faders');
  const padsEl   = document.getElementById('pads');
  const tracksEl = document.getElementById('tracks');
  for (const f of FADERS) buildFader(fadersEl, f);
  for (const p of PADS)   buildPad(padsEl, p);
  for (const t of TRACKS) buildTrackBtn(tracksEl, t);
  buildTrackBtn(tracksEl, { label: 'STOP\nALL', note: 45 }, true);
  updateOctaveDisplay();
</script>
</body>
</html>
